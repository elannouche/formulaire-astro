<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astrological Natal Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8CB7A;
    --dark: #0D0B12;
    --dark2: #15121E;
    --dark3: #1E1A2B;
    --border: rgba(201,168,76,0.2);
    --border-hover: rgba(201,168,76,0.5);
    --text: #E8E4DC;
    --text-muted: rgba(232,228,220,0.5);
    --success: #4CAF82;
    --error: #CF6679;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem 4rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Starry background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(100,60,180,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(180,100,60,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(201,168,76,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star {
    position: absolute; width: 2px; height: 2px; background: var(--gold-light);
    border-radius: 50%; opacity: 0; animation: twinkle var(--d, 3s) var(--delay, 0s) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--op, 0.6); transform: scale(1); }
  }

  .container { position: relative; z-index: 1; width: 100%; max-width: 560px; padding-top: 1rem; }

  /* Header */
  .header { text-align: center; margin-bottom: 2.5rem; animation: fadeDown 0.8s ease forwards; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  .header-emblem { font-size: 2rem; margin-bottom: 0.75rem; display: block; filter: drop-shadow(0 0 12px rgba(201,168,76,0.4)); }
  .header h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 300; letter-spacing: 0.05em; line-height: 1.2; }
  .header h1 em { font-style: italic; color: var(--gold-light); }
  .header p { margin-top: 0.75rem; font-size: 0.82rem; font-weight: 300; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }

  .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--border); }
  .divider::before, .divider::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }
  .divider span { font-size: 0.7rem; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; white-space: nowrap; }

  .card {
    background: var(--dark2); border: 0.5px solid var(--border); border-radius: 16px;
    padding: 2rem; animation: fadeUp 0.9s 0.1s ease forwards; opacity: 0;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .field { margin-bottom: 1.2rem; }
  label { display: block; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
  label .req { color: var(--error); margin-left: 2px; }

  input, select {
    width: 100%; height: 44px; padding: 0 14px; background: var(--dark3); border: 0.5px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 0.9rem; font-weight: 300;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s; color-scheme: dark;
  }
  input::placeholder { color: var(--text-muted); }
  input:focus { border-color: var(--border-hover); box-shadow: 0 0 0 3px rgba(201,168,76,0.08); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Autocomplete city */
  .city-wrap { position: relative; }
  .city-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); font-size: 14px; display: none; background: none; border: none; z-index: 2; }
  .dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--dark2); border: 0.5px solid var(--border-hover);
    border-radius: 8px; z-index: 999; max-height: 220px; overflow-y: auto; display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .dropdown.open { display: block; }
  .dd-item { padding: 10px 14px; cursor: pointer; font-size: 0.85rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .dd-item:hover, .dd-item.active { background: var(--dark3); }
  .dd-flag { font-size: 16px; flex-shrink: 0; }
  .dd-name { font-weight: 400; }
  .dd-detail { font-size: 0.75rem; color: var(--text-muted); }
  .dd-msg { padding: 12px 14px; font-size: 0.82rem; color: var(--text-muted); text-align: center; }

  /* Buttons */
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .toggle-btn {
    padding: 8px 18px; border: 0.5px solid var(--border); border-radius: 6px; background: transparent; color: var(--text-muted);
    font-family: 'Jost', sans-serif; font-size: 0.82rem; font-weight: 300; letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s;
  }
  .toggle-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .toggle-btn.sel { background: rgba(201,168,76,0.1); border-color: var(--gold); color: var(--gold-light); font-weight: 400; }

  .submit-btn {
    width: 100%; height: 50px; margin-top: 1rem; background: linear-gradient(135deg, #B8922A, #C9A84C, #B8922A);
    background-size: 200% 100%; border: none; border-radius: 10px; color: var(--dark); font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem; font-weight: 600; letter-spacing: 0.08em; cursor: pointer; transition: background-position 0.4s, opacity 0.2s, transform 0.15s;
  }
  .submit-btn:hover:not(:disabled) { background-position: 100% 0; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-inner { display: flex; align-items: center; justify-content: center; gap: 8px; }

  .spinner { width: 16px; height: 16px; border: 2px solid rgba(13,11,18,0.3); border-top-color: var(--dark); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-box { margin-top: 1rem; padding: 14px 16px; border-radius: 10px; font-size: 0.85rem; line-height: 1.6; display: none; }
  .status-box.sending { display: block; background: rgba(201,168,76,0.08); border: 0.5px solid rgba(201,168,76,0.3); color: var(--gold-light); }
  .status-box.success { display: block; background: rgba(76,175,130,0.08); border: 0.5px solid rgba(76,175,130,0.3); color: #6ECFA0; }
  .status-box.error   { display: block; background: rgba(207,102,121,0.08); border: 0.5px solid rgba(207,102,121,0.3); color: #E08898; }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <div class="header">
    <span class="header-emblem">✦</span>
    <h1>Birth Chart <em>Reading</em></h1>
    <p>Astrological Analysis · Personalized Report</p>
  </div>

  <div class="card">
    <div class="field">
      <label>First Name <span class="req">*</span></label>
      <input type="text" id="f_name" placeholder="Your name" autocomplete="off">
    </div>

    <!-- EMAIL IS NOW OPTIONAL -->
    <div class="field">
      <label>Email Address (Optional)</label>
      <input type="email" id="f_email" placeholder="you@email.com" autocomplete="off">
    </div>

    <div class="row2">
      <div class="field">
        <label>Date of Birth <span class="req">*</span></label>
        <input type="date" id="f_date">
      </div>
      <!-- TIME IS NOW OPTIONAL -->
      <div class="field">
        <label>Time of Birth (Optional)</label>
        <input type="time" id="f_time">
      </div>
    </div>

    <div class="field">
      <label>City of Birth <span class="req">*</span></label>
      <div class="city-wrap">
        <input type="text" id="f_city" placeholder="Type city name..." autocomplete="off">
        <button class="city-clear" id="city_clear" type="button" onclick="clearCity()">✕</button>
        <div class="dropdown" id="city_dd"></div>
      </div>
    </div>

    <div class="divider"><span>Additional details</span></div>

    <div class="field">
      <label>Gender</label>
      <div class="btn-group" id="gender_group">
        <button class="toggle-btn sel" type="button" onclick="sel(this,'gender_group','Female')">Female</button>
        <button class="toggle-btn" type="button" onclick="sel(this,'gender_group','Male')">Male</button>
        <button class="toggle-btn" type="button" onclick="sel(this,'gender_group','Other')">Other</button>
      </div>
    </div>

    <div class="field">
      <label>Report Language</label>
      <div class="btn-group" id="lang_group">
        <button class="toggle-btn sel" type="button" onclick="sel(this,'lang_group','English')">English</button>
        <button class="toggle-btn" type="button" onclick="sel(this,'lang_group','French')">Français</button>
        <button class="toggle-btn" type="button" onclick="sel(this,'lang_group','Spanish')">Español</button>
        <button class="toggle-btn" type="button" onclick="sel(this,'lang_group','German')">Deutsch</button>
        <button class="toggle-btn" type="button" onclick="sel(this,'lang_group','Portuguese')">Português</button>
        <button class="toggle-btn" type="button" onclick="sel(this,'lang_group','Arabic')" style="font-family:sans-serif">العربية</button>
      </div>
    </div>

    <button class="submit-btn" id="submit_btn" type="button" onclick="handleSubmit()">
      <span class="btn-inner">
        <span class="spinner" id="spinner"></span>
        <span id="btn_label">Request my birth chart</span>
      </span>
    </button>

    <div class="status-box" id="status_box"></div>
  </div>
</div>

<script>
// ==========================================
// ⚠️ CONFIGURATION - MODIFIE CES DEUX LIGNES
// ==========================================

// 1. Ton URL Google Apps Script (Déploiement > Application Web)
const GAS_URL = "https://script.google.com/macros/s/AKfycbxbVYcfM4nQXsC2JZPMkaIAWSuHfvWJRep_8dok7R0g1IhQZ9Px8g6GoIJjGBK1C7m6/exec"; 

// 2. Ton nom d'utilisateur gratuit créé sur geonames.org
const GEONAMES_USERNAME = "elannouche"; 

// ==========================================

(function() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div'); s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;--op:${0.2+Math.random()*0.6}`;
    c.appendChild(s);
  }
})();

let selectedCity = null;
let gender = 'Female';
let lang = 'English';
let cityTimer = null;
let ddActive = -1;

function sel(btn, groupId, val) {
  document.querySelectorAll('#'+groupId+' .toggle-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  if (groupId === 'gender_group') gender = val; else lang = val;
}

const cityInp = document.getElementById('f_city');
const cityDd  = document.getElementById('city_dd');
const cityClr = document.getElementById('city_clear');

cityInp.addEventListener('input', () => {
  const q = cityInp.value.trim();
  cityClr.style.display = q ? 'block' : 'none';
  selectedCity = null; clearTimeout(cityTimer);
  if (q.length < 2) { cityDd.classList.remove('open'); return; }
  cityDd.innerHTML = '<div class="dd-msg">Searching...</div>';
  cityDd.classList.add('open'); ddActive = -1;
  cityTimer = setTimeout(() => fetchCities(q), 320);
});

function clearCity() {
  cityInp.value = ''; cityClr.style.display = 'none'; cityDd.classList.remove('open'); selectedCity = null; cityInp.focus();
}

function flag(cc) {
  if (!cc || cc.length !== 2) return '';
  try { return String.fromCodePoint(...[...cc.toUpperCase()].map(c => 0x1F1E0 + c.charCodeAt(0) - 65)); } catch { return ''; }
}

async function fetchCities(q) {
  try {
    const url = `https://secure.geonames.org/searchJSON?q=${encodeURIComponent(q)}&maxRows=8&featureClass=P&orderby=population&username=${GEONAMES_USERNAME}&lang=en`;
    const r = await fetch(url);
    const data = await r.json();
    if (data.geonames && data.geonames.length) { renderCities(data.geonames); return; }
  } catch(e) {}
  cityDd.innerHTML = '<div class="dd-msg">No city found. Check spelling.</div>';
}

function renderCities(cities) {
  cityDd.innerHTML = '';
  cities.forEach(c => {
    const div = document.createElement('div'); div.className = 'dd-item';
    const region = c.adminName1 ? c.adminName1 + ', ' : '';
    div.innerHTML = `<span class="dd-flag">${flag(c.countryCode)}</span><div><div class="dd-name">${c.name}</div><div class="dd-detail">${region}${c.countryName||''}</div></div>`;
    div.onclick = () => pickCity(c);
    cityDd.appendChild(div);
  });
}

function pickCity(c) {
  const lat = parseFloat(c.lat || c.latitude); const lng = parseFloat(c.lng || c.longitude);
  const region = c.adminName1 ? ', ' + c.adminName1 : '';
  cityInp.value = c.name + region + ', ' + (c.countryName || c.countryCode);
  cityClr.style.display = 'block'; cityDd.classList.remove('open');
  selectedCity = { name: c.name, country: c.countryName || c.countryCode, lat, lng };
}

async function handleSubmit() {
  const name   = document.getElementById('f_name').value.trim();
  const email  = document.getElementById('f_email').value.trim();
  const dateV  = document.getElementById('f_date').value;
  const timeV  = document.getElementById('f_time').value;

  const missing = [];
  if (!name)   missing.push('First Name');
  if (!dateV)  missing.push('Date of Birth');
  if (!selectedCity) missing.push('City of Birth (select from list)');

  if (missing.length) {
    showStatus('error', '⚠ Missing fields:\n' + missing.map(m => '· '+m).join('\n'));
    return;
  }

  const [year, month, day] = dateV.split('-').map(Number);
  
  // Heure par défaut à 12:00 si laissée vide
  let hour = 12, minute = 0;
  if (timeV) {
    const timeParts = timeV.split(':').map(Number);
    hour = timeParts[0]; minute = timeParts[1];
  }

  const payload = {
    name, email, day, month, year, hour, minute,
    city: selectedCity.name + ', ' + selectedCity.country,
    lat: selectedCity.lat, lng: selectedCity.lng,
    gender, language: lang,
  };

  const btn = document.getElementById('submit_btn');
  const spinner = document.getElementById('spinner');
  const btnLabel = document.getElementById('btn_label');
  btn.disabled = true; spinner.style.display = 'block'; btnLabel.textContent = 'Processing...';
  showStatus('sending', '✦ Sending your request...');

  try {
    // CORRECTION DU CORS ICI (text/plain)
    const response = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    
    const result = await response.json();
    
    if (result.status === "ok") {
      showStatus('success', `✦ Request sent successfully!\n\nWe have received your birth details. We will contact you as soon as your personalized reading is ready.`);
    } else {
      throw new Error(result.message || "Server error");
    }

  } catch (err) {
    showStatus('error', `❌ Connection error. Please try again later.`);
  } finally {
    btn.disabled = false; spinner.style.display = 'none'; btnLabel.textContent = 'Request my birth chart';
  }
}

function showStatus(type, msg) {
  const box = document.getElementById('status_box');
  box.className = 'status-box ' + type; box.style.whiteSpace = 'pre-line'; box.textContent = msg;
}
</script>
</body>
</html>
